version: '3.8'

# SLG 项目 - Zookeeper 单实例 + ZooNavigator 可视化管理
# 启动：docker compose up -d（ZK 与 ZooNavigator 一起启动）
# 停止：docker-compose down
# 停止并删除数据：docker-compose down -v
#
# 用途：ZK 用于服务注册与发现、GameServer/SceneServer 配置、导量配置；ZooNavigator 访问 http://localhost:9000
# 项目 base-path：/slg
#
# 若本机连不上 2181：先 docker compose down，再 docker compose up -d --force-recreate

services:
  zookeeper:
    image: zookeeper:3.9
    container_name: slg-zookeeper
    ports:
      - "2181:2181"
      - "28080:8080"   # 避免与主机 8080 冲突，管理端用 28080
    environment:
      ZOO_MY_ID: 1
      ZOO_TICK_TIME: 2000
      ZOO_INIT_LIMIT: 5
      ZOO_SYNC_LIMIT: 2
      ZOO_MAX_CLIENT_CNXNS: 100
      TZ: Asia/Shanghai
    volumes:
      - zk-data:/data
      - zk-datalog:/datalog
      - zk-logs:/logs
      - ./init-zk.sh:/init-zk.sh
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - slg-zk-net
    healthcheck:
      # ZK 3.9+ 默认仅启用 srvr，用 srvr 检查是否存活
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  zoonavigator:
    image: elkozmon/zoonavigator:2.0.0
    container_name: slg-zoonavigator
    ports:
      - "9000:9000"
    environment:
      HTTP_PORT: 9000
      TZ: Asia/Shanghai
      CONNECTION_SLG_CONN: zookeeper:2181
      CONNECTION_SLG_NAME: SLG Zookeeper
    depends_on:
      zookeeper:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - slg-zk-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  zk-data:
    driver: local
  zk-datalog:
    driver: local
  zk-logs:
    driver: local

networks:
  slg-zk-net:
    driver: bridge
