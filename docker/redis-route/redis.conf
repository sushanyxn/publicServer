# SLG 转发 Redis 配置
# 用途：RPC Redis Stream 跨服消息转发，与业务 Redis 完全隔离

# 绑定所有网卡（Docker 容器内使用）
bind 0.0.0.0

# 不设置保护模式（容器内网络隔离保证安全）
protected-mode no

# 关闭持久化（转发 Redis 为消息中转，不需要持久化）
save ""
appendonly no

# 最大内存限制（按实际需求调整）
maxmemory 256mb
maxmemory-policy allkeys-lru

# Stream 相关
# 单个 Stream 最大条目数（防止积压过多）
# 消费者正常消费时实际占用很少
# stream-node-max-bytes 4096
# stream-node-max-entries 100

# 日志级别
loglevel notice

# 超时设置
timeout 0
tcp-keepalive 60
