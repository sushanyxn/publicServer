version: '3.8'

# SLG 项目 - Redis 单实例
# 启动：docker-compose up -d
# 停止：docker-compose down
# 停止并删除数据：docker-compose down -v
#
# 若本机连不上 6379：可能是容器在“端口被占用”时曾创建未成功启动，端口未绑定。
# 解决：先 docker compose down，再 docker compose up -d --force-recreate

services:
  redis:
    image: redis:7.2
    container_name: slg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - slg-redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  slg-redis-net:
    driver: bridge
