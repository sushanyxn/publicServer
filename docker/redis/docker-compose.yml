version: '3.8'

# SLG 项目 - Redis 单实例
# 启动：docker-compose up -d
# 停止：docker-compose down
# 停止并删除数据：docker-compose down -v

services:
  redis:
    image: redis:7.2
    container_name: slg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - slg-redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  slg-redis-net:
    driver: bridge
