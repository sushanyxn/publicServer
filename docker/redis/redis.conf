# SLG Redis 配置

# 绑定地址（容器内允许外部访问）
bind 0.0.0.0

# 端口
port 6379

# 无密码（开发环境，生产环境请设置 requirepass）
# requirepass your_password

# 最大内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 持久化 - RDB 快照
save 900 1
save 300 10
save 60 10000

# 持久化 - AOF
appendonly yes
appendfsync everysec

# 日志级别
loglevel notice

# 最大客户端连接数
maxclients 1000

# 数据库数量（项目使用 database 0）
databases 16
