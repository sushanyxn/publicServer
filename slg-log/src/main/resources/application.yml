# 告警日志分析系统配置

spring:
  application:
    name: slg-log-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:mysql://localhost:3306/slg_log?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# HTTP 端口
server:
  port: 8092

# Elasticsearch 配置
elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  index-prefix: slg-logs

# JWT 配置
jwt:
  secret: slg-log-jwt-secret-key-change-in-production-at-least-32-bytes
  expiration-ms: 86400000
