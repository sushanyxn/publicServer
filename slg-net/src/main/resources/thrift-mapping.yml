# Thrift 协议映射配置
# 定义 Thrift 消息 ID / 生成类 与 服务器内部 POJO 的对应关系
#
# 格式: 每行 "thriftMsgId, thriftClass, pojoClass"
#   thriftMsgId: 客户端 Thrift 协议使用的消息 ID
#   thriftClass: Thrift IDL 生成的 Java 类全限定名
#   pojoClass:   服务器内部 POJO 类全限定名
#
# 支持按模块分组，组名仅用于可读性，不影响逻辑
#
# 示例（取消注释并替换为真实的 Thrift 生成类）:
#
# thrift-mappings:
#   login:
#     - 1001, com.slg.net.thrift.generated.TLoginReq, com.slg.net.message.clientmessage.login.packet.CM_LoginReq
#     - 1002, com.slg.net.thrift.generated.TLoginResp, com.slg.net.message.clientmessage.login.packet.SM_LoginResp
#
#   scene:
#     - 1100, com.slg.net.thrift.generated.TEnterScene, com.slg.net.message.clientmessage.scene.packet.CM_EnterScene

thrift-mappings: {}
