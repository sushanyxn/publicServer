# SLG 场景服务器配置文件

# Spring 配置
spring:
  application:
    name: slg-scene-server

  # MongoDB 配置
  data:
    mongodb:
      # MongoDB 连接 URI（单实例配置）
      uri: mongodb://localhost:27017/slg_scene
      # 自动创建索引（开发环境可开启，生产环境建议关闭）
      auto-index-creation: true

# 服务器基础信息配置
server:
  scene:
    # 服务器ID
    server-id: 2

# Rpc 配置
rpc:
  server:
    port: 51002
  client:
    route-service-class: com.slg.scene.net.rpc.SceneRpcRouteService

# Redis 配置
redis:
  host: localhost
  port: 6379
  password:
  database: 0
  timeout: 3000
  pool:
    max-active: 16
    max-idle: 8
    min-idle: 2
    max-wait: 3000

# Zookeeper 配置
zookeeper:
  connect-string: 127.0.0.1:2181
  session-timeout: 30000
  connection-timeout: 10000
  base-path: /slg
  retry:
    count: 3
    interval: 1000

# 配置表路径配置
table:
  # 配置表文件所在目录（相对于项目根目录或绝对路径）
  path: table

# 日志 ES 推送配置
log:
  server-id: 2
  server-type: scene
  es:
    enabled: false
    host: localhost
    port: 9200
    scheme: http
    index-prefix: slg-logs
    level: WARN
