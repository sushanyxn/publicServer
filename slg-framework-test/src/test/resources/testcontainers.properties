# Testcontainers 连接 Docker 的配置（随 classpath 被测试 JVM 加载）
# 使用环境变量/系统属性策略，便于 Windows 指定命名管道
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
# Windows + Docker Desktop：命名管道（冒号需转义）
# default context 用 docker_engine；desktop-linux context 可改为 dockerDesktopLinuxEngine
docker.host=npipe\:////./pipe/docker_engine
# 若在 Linux/Mac 上运行，可注释上一行或设环境变量 DOCKER_HOST=unix:///var/run/docker.sock
